server:
  port: 8080

spring:
  application:
    name: session-replay
  ai:
    openai:
      api-key: dummy_key
      base-url: https://generativelanguage.googleapis.com/v1beta/openai/
      chat:
        options:
          model: gemini-2.5-flash
          temperature: 0.3
          max-tokens: 65536

logging:
  level:
    root: INFO
    org.springframework.ai: DEBUG

tracecraft:
  code-context:
    enabled: true
    source-root: ${user.dir}/../demo-app/src/main/java
    max-files: 3
    max-snippet-lines: 50
